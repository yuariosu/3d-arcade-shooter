<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON RUNNER 2049 - FINAL EDITION</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: #000; color: #fff;
            user-select: none; cursor: crosshair;
        }
        canvas { display: block; width: 100vw; height: 100vh; }

        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            display: flex; gap: 15px; pointer-events: none;
        }
        .stat {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 20px; border-radius: 4px;
            backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 22px; font-weight: bold; display: block; margin-top: -3px; }
        #score-val { color: #00ffff; }
        #dist-val { color: #ff00ff; }
        #combo-val { color: #ffaa00; }

        #cooldown-container {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            width: 150px;
        }
        #cooldown-label {
            font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px;
        }
        #cooldown-bar-bg {
            width: 100%; height: 15px; background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
            overflow: hidden;
        }
        #cooldown-bar {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, #ff0055, #ffaa00);
            transition: width 0.05s linear;
            box-shadow: 0 0 10px rgba(255,0,85,0.8);
        }

        #controls-hint {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(0,0,0,0.5); padding: 8px 20px;
            border-radius: 4px; font-size: 12px; color: #888;
            pointer-events: none; text-align: center;
        }

        #combo-flash {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            font-size: 72px; font-weight: 900; color: #ffaa00;
            text-shadow: 0 0 20px rgba(255,170,0,0.8);
            opacity: 0; z-index: 50; pointer-events: none;
            font-style: italic; transition: opacity 0.3s;
        }

        #nearmiss-msg {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 36px; font-weight: bold; color: #00ff00;
            text-shadow: 0 0 15px rgba(0,255,0,0.9);
            opacity: 0; z-index: 50; pointer-events: none;
            transition: opacity 0.3s;
        }

        #powerups {
            position: absolute; top: 80px; right: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 8px;
        }
        .powerup-slot {
            width: 60px; border-radius: 8px;
            background: rgba(0,0,0,0.6); border: 2px solid;
            backdrop-filter: blur(5px);
            animation: pulse 1s infinite;
            overflow: hidden;
        }
        .powerup-slot-inner {
            display: flex; align-items: center; justify-content: center;
            height: 44px; font-size: 24px;
        }
        .timer-track {
            height: 5px; background: rgba(255,255,255,0.1);
            margin: 0 4px 4px;
        }
        .timer-fill {
            height: 100%; width: 100%;
            transition: width 0.1s linear;
            border-radius: 2px;
        }
        .boost-fill  { background: linear-gradient(90deg, #ffaa00, #ffff00); }
        .slow-fill   { background: linear-gradient(90deg, #00cc44, #00ffaa); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10,10,25,0.95); padding: 32px 48px; border-radius: 12px;
            text-align: center; z-index: 100; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 50px rgba(0,255,255,0.2);
            min-width: min(400px, 90vw); max-width: 90vw;
            backdrop-filter: blur(15px);
        }
        h1 {
            margin: 0 0 25px 0; font-size: 42px;
            background: linear-gradient(to right, #00ffff, #ff00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; font-style: italic;
        }
        .diff-container {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            margin: 20px 0;
        }
        .diff-btn {
            background: transparent; border: 1px solid #555; color: #888;
            padding: 12px; cursor: pointer; border-radius: 4px;
            font-weight: bold; transition: all 0.2s; font-size: 14px;
        }
        .diff-btn:hover { border-color: #fff; color: #fff; }
        .diff-btn.active { background: #fff; color: #000; border-color: #fff; }
        
        .start-btn {
            padding: 15px 50px; font-size: 22px; font-weight: bold;
            background: linear-gradient(90deg, #00ffff, #0088ff);
            color: #000; border: none; border-radius: 4px;
            cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; margin-top: 20px;
        }
        .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,255,255,0.7); }
        
        .menu-btn {
            padding: 12px 40px; font-size: 18px; font-weight: bold;
            background: transparent; border: 2px solid #fff;
            color: #fff; border-radius: 4px;
            cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; margin: 10px 5px;
        }
        .menu-btn:hover { background: #fff; color: #000; }

        .hidden { display: none !important; }

        #damage-flash {
            position: fixed; inset: 0; z-index: 200;
            pointer-events: none;
            background: rgba(255, 0, 50, 0.55);
            opacity: 0;
            transition: opacity 0.15s ease-out;
        }
        #coin-flash {
            position: fixed; inset: 0; z-index: 199;
            pointer-events: none;
            background: rgba(255, 255, 0, 0.2);
            opacity: 0;
            transition: opacity 0.12s ease-out;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat">
            <div class="stat-label">Score</div>
            <div class="stat-value" id="score-val">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Distance</div>
            <div class="stat-value" id="dist-val">0m</div>
        </div>
        <div class="stat">
            <div class="stat-label">Combo</div>
            <div class="stat-value" id="combo-val">x1</div>
        </div>
    </div>

    <div id="cooldown-container" class="hidden">
        <div id="cooldown-label">🔫 WEAPON</div>
        <div id="cooldown-bar-bg">
            <div id="cooldown-bar"></div>
        </div>
    </div>

    <div id="controls-hint" class="hidden">
        [A/D] 移動 | [SPACE] ジャンプ | [W/CLICK] 射撃 | [ESC] ポーズ
    </div>

    <div id="damage-flash"></div>
    <div id="coin-flash"></div>

    <div id="powerups">
        <div id="powerup-shield" class="powerup-slot hidden" style="border-color:#00aaff;">
            <div class="powerup-slot-inner">🛡️</div>
        </div>
        <div id="powerup-boost" class="powerup-slot hidden" style="border-color:#ffff00;">
            <div class="powerup-slot-inner">⚡</div>
            <div class="timer-track"><div id="boost-timer-bar" class="timer-fill boost-fill"></div></div>
        </div>
        <div id="powerup-slow" class="powerup-slot hidden" style="border-color:#00ff88;">
            <div class="powerup-slot-inner">🕐</div>
            <div class="timer-track"><div id="slow-timer-bar" class="timer-fill slow-fill"></div></div>
        </div>
    </div>

    <div id="combo-flash"></div>
    <div id="nearmiss-msg"></div>

    <div id="menu">
        <div id="start-screen">
            <h1>NEON RUNNER</h1>
            <p style="margin-bottom: 15px; color: #aaa;">難易度を選択</p>
            <div class="diff-container">
                <button class="diff-btn" onclick="selectDiff('easy', this)">🟢 EASY<br><span id="hs-easy" style="font-size:10px;color:#555;">BEST: 0</span></button>
                <button class="diff-btn active" onclick="selectDiff('normal', this)">🔵 NORMAL<br><span id="hs-normal" style="font-size:10px;color:#555;">BEST: 0</span></button>
                <button class="diff-btn" onclick="selectDiff('hard', this)">🔴 HARD<br><span style="font-size:10px;color:#888;">敵も攻撃！</span><br><span id="hs-hard" style="font-size:10px;color:#555;">BEST: 0</span></button>
                <button class="diff-btn" onclick="selectDiff('expert', this)">💀 EXPERT<br><span style="font-size:10px;color:#888;">弾幕地獄</span><br><span id="hs-expert" style="font-size:10px;color:#555;">BEST: 0</span></button>
            </div>
            <button class="start-btn" id="btn-start">START</button>
            <p style="margin-top: 15px; font-size: 11px; color: #666;">
                💰コイン収集 | 🔫障害物破壊 | 連続回避でコンボ！<br>
                Hard以上: 敵の弾幕を避けろ | ニアミスでボーナス
            </p>
        </div>
        
        <div id="pause-screen" class="hidden">
            <h1 style="font-size: 36px;">PAUSED</h1>
            <p style="margin: 15px 0; color: #aaa;">
                SCORE: <span id="pause-score" style="color:#00ffff;font-weight:bold;">0</span><br>
                COMBO: <span id="pause-combo" style="color:#ffaa00;font-weight:bold;">x1</span>
            </p>
            <button class="menu-btn" id="btn-resume">RESUME</button>
            <button class="menu-btn" id="btn-quit" style="border-color: #ff4444; color: #ff4444;">QUIT</button>
        </div>
        
        <div id="gameover-screen" class="hidden">
            <h1 style="color: #ff4444; -webkit-text-fill-color: #ff4444;">GAME OVER</h1>
            <p id="new-record-msg" style="color:#ffff00;font-weight:bold;font-size:16px;margin:5px 0 0;display:none;">🏆 NEW HIGH SCORE!</p>
            <p style="font-size: 17px; margin: 15px 0; line-height: 1.7;">
                SCORE: <span id="final-score" style="color:#fff; font-weight:bold;">0</span><br>
                <span style="font-size:12px;color:#888;">BEST: <span id="best-score" style="color:#ffaa00;">0</span></span><br>
                DISTANCE: <span id="final-dist" style="color:#ff00ff; font-weight:bold;">0m</span><br>
                MAX COMBO: <span id="max-combo" style="color:#ffaa00; font-weight:bold;">0</span><br>
                DESTROYED: <span id="destroyed-count" style="color:#ff0055; font-weight:bold;">0</span>
            </p>
            <button class="start-btn" id="btn-retry" style="background: linear-gradient(90deg, #ff4444, #ff0055);">RETRY</button>
            <button class="menu-btn" id="btn-home">HOME</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    if (typeof THREE === 'undefined') throw new Error("Three.js not loaded");

    // ===== 共有オブジェクト（毎フレーム生成を避けてパフォーマンス最適化） =====
    // 敵弾：Geometry/Materialを1インスタンスで全弾共有
    const ENEMY_BULLET_GEO = new THREE.SphereGeometry(0.15, 6, 6); // セグメント削減（12→6）
    const ENEMY_BULLET_MAT = new THREE.MeshBasicMaterial({ color: 0xff00aa }); // PointLight不要の軽量Material
    // プレイヤー弾：Geometryを共有（Materialも共有可能）
    const PLAYER_BULLET_GEO = new THREE.SphereGeometry(0.18, 7, 7);
    const PLAYER_BULLET_MAT = new THREE.MeshBasicMaterial({ color: 0xff3366 });

    // ===== ハイスコア =====
    function getHighScore(diff) {
        return parseInt(localStorage.getItem('hs_' + diff) || '0');
    }
    function checkAndSaveHighScore(diff, s) {
        if (s > getHighScore(diff)) {
            localStorage.setItem('hs_' + diff, s);
            return true;
        }
        return false;
    }
    function updateStartScreenHighScores() {
        ['easy','normal','hard','expert'].forEach(d => {
            const el = document.getElementById('hs-' + d);
            if (el) el.textContent = 'BEST: ' + getHighScore(d).toLocaleString();
        });
    }

    let scene, camera, renderer;
    let player, gridHelper1, gridHelper2;
    let obstacles = [], coins = [], powerups = [], bullets = [], enemyBullets = [], particles = [];
    let stars, starGeo;
    let isGameRunning = false, isPaused = false;

    let score = 0, distance = 0, combo = 1, maxCombo = 1;
    let destroyedCount = 0;
    let gameSpeed = 0, spawnTimer = 0, itemSpawnTimer = 0;
    let difficulty = 'normal';
    let consecutiveAvoid = 0;

    let canShoot = true;
    let shootCooldown = 0;
    const SHOOT_COOLDOWN_MAX = 15;

    let activeShield = false, activeBoost = false, activeSlow = false;
    let boostTimer = 0, slowTimer = 0;

    let velocityX = 0, velocityY = 0, isJumping = false;
    const GRAVITY = 0.025, JUMP_FORCE = 0.5, PLAYER_Y = 0.5;
    const keys = { left: false, right: false };

    let shakeAmount = 0;
    const CAM_BASE_X = 0, CAM_BASE_Y = 3, CAM_BASE_Z = 7;

    const settings = {
        easy:   { speed: 0.18, max: 0.45, obstRate: 40, itemRate: 100, coinRate: 70,  accel: 0.0001, multiSpawn: 0.20, enemyShootInterval: 0,  maxEnemyBullets: 0,  shootChance: 0.0  },
        normal: { speed: 0.28, max: 0.70, obstRate: 28, itemRate: 180, coinRate: 100, accel: 0.0005, multiSpawn: 0.40, enemyShootInterval: 0,  maxEnemyBullets: 0,  shootChance: 0.0  },
        hard:   { speed: 0.32, max: 0.75, obstRate: 24, itemRate: 230, coinRate: 120, accel: 0.0006, multiSpawn: 0.38, enemyShootInterval: 55, maxEnemyBullets: 5,  shootChance: 0.35 },
        expert: { speed: 0.42, max: 1.05, obstRate: 16, itemRate: 300, coinRate: 155, accel: 0.0009, multiSpawn: 0.52, enemyShootInterval: 38, maxEnemyBullets: 8,  shootChance: 0.50 }
    };

    // ===== Web Audio API サウンドシステム =====
    let audioCtx = null;

    function initAudio() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { console.warn('Web Audio API unavailable'); }
    }

    function playTone(freq, dur, vol = 0.25, type = 'square', freqEnd = null) {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + dur);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        } catch(e) {}
    }

    function playNoise(dur, vol = 0.3) {
        if (!audioCtx) return;
        try {
            const bufLen = Math.ceil(audioCtx.sampleRate * dur);
            const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            const gain = audioCtx.createGain();
            src.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            src.start(); src.stop(audioCtx.currentTime + dur);
        } catch(e) {}
    }

    function playSound(type) {
        if (!audioCtx) return;
        switch (type) {
            case 'shoot':
                playTone(700, 0.07, 0.18, 'square', 350);
                break;
            case 'explode':
                playNoise(0.22, 0.35);
                playTone(120, 0.22, 0.25, 'sawtooth', 40);
                break;
            case 'coin':
                playTone(880, 0.05, 0.2, 'sine');
                setTimeout(() => playTone(1320, 0.1, 0.2, 'sine'), 55);
                break;
            case 'powerup':
                playTone(440, 0.1, 0.25, 'sine');
                setTimeout(() => playTone(660, 0.1, 0.25, 'sine'), 110);
                setTimeout(() => playTone(880, 0.15, 0.25, 'sine'), 220);
                break;
            case 'hit':
                playNoise(0.12, 0.45);
                playTone(160, 0.18, 0.35, 'sawtooth', 60);
                break;
            case 'shield':
                playTone(800, 0.12, 0.3, 'sine', 500);
                break;
            case 'jump':
                playTone(320, 0.04, 0.12, 'square');
                setTimeout(() => playTone(480, 0.08, 0.1, 'square'), 40);
                break;
            case 'nearmiss':
                playTone(220, 0.12, 0.18, 'sawtooth');
                break;
            case 'gameover':
                playTone(440, 0.2, 0.35, 'sine');
                setTimeout(() => playTone(330, 0.2, 0.35, 'sine'), 220);
                setTimeout(() => playTone(220, 0.25, 0.35, 'sine'), 440);
                setTimeout(() => playTone(110, 0.5,  0.35, 'sine'), 700);
                break;
            case 'intercept':
                playTone(1000, 0.08, 0.2, 'sine', 600);
                break;
        }
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.015);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 3, 7);
        camera.lookAt(0, 0, -5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        createEnvironment();
        createPlayer();
        createStarfield();

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);
        document.addEventListener('click', onMouseClick);
        window.addEventListener('resize', onResize);
        initTouchControls();
        
        document.getElementById('btn-start').addEventListener('click', startGame);
        document.getElementById('btn-retry').addEventListener('click', startGame);
        document.getElementById('btn-resume').addEventListener('click', resumeGame);
        document.getElementById('btn-quit').addEventListener('click', quitToHome);
        document.getElementById('btn-home').addEventListener('click', quitToHome);

        animate();
        updateStartScreenHighScores();
    }

    function createEnvironment() {
        const planeGeo = new THREE.PlaneGeometry(60, 250);
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2, metalness: 0.6 });
        const ground = new THREE.Mesh(planeGeo, planeMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.z = -75;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridSize = 80;
        gridHelper1 = new THREE.GridHelper(gridSize, 80, 0x00ffff, 0x222222);
        gridHelper1.position.y = 0.02;
        gridHelper1.position.z = 0;
        scene.add(gridHelper1);

        gridHelper2 = new THREE.GridHelper(gridSize, 80, 0x00ffff, 0x222222);
        gridHelper2.position.y = 0.02;
        gridHelper2.position.z = -gridSize;
        scene.add(gridHelper2);
    }

    function createPlayer() {
        const geo = new THREE.SphereGeometry(0.5, 32, 32);
        const mat = new THREE.MeshStandardMaterial({ color: 0x000, emissive: 0x00ffff, emissiveIntensity: 0.7 });
        player = new THREE.Mesh(geo, mat);
        player.position.set(0, PLAYER_Y, 2);
        player.castShadow = true;
        scene.add(player);
        
        const light = new THREE.PointLight(0x00ffff, 1, 8);
        player.add(light);
    }

    function createStarfield() {
        starGeo = new THREE.BufferGeometry();
        const count = 500, pos = new Float32Array(count * 3);
        for(let i=0; i<count*3; i++) pos[i] = (Math.random() - 0.5) * 120;
        starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        starGeo.attributes.position.setUsage(THREE.DynamicDrawUsage);
        const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 });
        stars = new THREE.Points(starGeo, mat);
        scene.add(stars);
    }

    window.selectDiff = function(level, btn) {
        difficulty = level;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    };

    function startGame() {
        initAudio();
        hideAllScreens();
        const hint = document.getElementById('controls-hint');
        hint.classList.remove('hidden');
        hint.innerHTML = ('ontouchstart' in window)
            ? '↔ スワイプ: 移動 | ↑ スワイプ: ジャンプ | タップ: 射撃 | [ESC] ポーズ'
            : '[A/D] 移動 | [SPACE] ジャンプ | [W/クリック] 射撃 | [ESC] ポーズ';
        document.getElementById('cooldown-container').classList.remove('hidden');

        isGameRunning = true; isPaused = false;
        score = 0; distance = 0; combo = 1; maxCombo = 1; consecutiveAvoid = 0;
        destroyedCount = 0;
        spawnTimer = 0; itemSpawnTimer = 0;
        activeShield = false; activeBoost = false; activeSlow = false;
        canShoot = true; shootCooldown = 0;

        const cfg = settings[difficulty];
        gameSpeed = cfg.speed;

        player.position.set(0, PLAYER_Y, 2);
        player.rotation.set(0,0,0);
        velocityX = 0; velocityY = 0; isJumping = false;

        obstacles.forEach(o => scene.remove(o));
        coins.forEach(c => scene.remove(c));
        powerups.forEach(p => scene.remove(p));
        bullets.forEach(b => scene.remove(b));
        enemyBullets.forEach(b => scene.remove(b));
        particles.forEach(p => scene.remove(p));
        obstacles = []; coins = []; powerups = []; bullets = []; enemyBullets = []; particles = [];

        updateHUD();
        updatePowerupUI();
    }

    function pauseGame() {
        isPaused = true; isGameRunning = false;
        document.getElementById('pause-score').innerText = score.toLocaleString();
        document.getElementById('pause-combo').innerText = 'x' + combo;
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('pause-screen').classList.remove('hidden');
    }

    function resumeGame() {
        isPaused = false; isGameRunning = true;
        hideAllScreens();
        document.getElementById('controls-hint').classList.remove('hidden');
        document.getElementById('cooldown-container').classList.remove('hidden');
    }

    function quitToHome() {
        isGameRunning = false; isPaused = false;
        hideAllScreens();
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
        
        obstacles.forEach(o => scene.remove(o));
        coins.forEach(c => scene.remove(c));
        powerups.forEach(p => scene.remove(p));
        bullets.forEach(b => scene.remove(b));
        enemyBullets.forEach(b => scene.remove(b));
        particles.forEach(p => scene.remove(p));
        obstacles = []; coins = []; powerups = []; bullets = []; enemyBullets = []; particles = [];
    }

    function hideAllScreens() {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('pause-screen').classList.add('hidden');
        document.getElementById('gameover-screen').classList.add('hidden');
        document.getElementById('controls-hint').classList.add('hidden');
        document.getElementById('cooldown-container').classList.add('hidden');
    }

    function spawnObstacle() {
        const cfg = settings[difficulty];
        const numObstacles = Math.random() < cfg.multiSpawn ? (Math.random() < 0.4 ? 3 : 2) : 1;
        
        const lanes = [-3, -1.5, 0, 1.5, 3];
        const usedLanes = [];

        for (let n = 0; n < numObstacles; n++) {
            const typeRoll = Math.random();
            let w, h, geo;
            if (typeRoll < 0.3) {
                w=0.8; h=0.8;
                geo = new THREE.BoxGeometry(w, h, w);
            } else if (typeRoll < 0.55) {
                w=0.6; h=1.6;
                geo = new THREE.BoxGeometry(w, h, w);
            } else if (typeRoll < 0.72) {
                w=1.5; h=0.6;
                geo = new THREE.BoxGeometry(w, h, w);
            } else {
                // 新タイプ：八面体（より速く回転し、視覚的に目立つ）
                w=0.85; h=0.85;
                geo = new THREE.OctahedronGeometry(0.65);
            }
            // shootChance: Hard=35%, Expert=50%（旧: 全難易度で70%）
            const canShoot = (cfg.enemyShootInterval > 0) && (Math.random() < cfg.shootChance);
            // 障害物の色を多様化: 撃てる=ピンク, ノーマル=オレンジ/シアン/紫からランダム
            let color;
            if (canShoot) {
                color = 0xff0055;
            } else {
                const colors = [0xffaa00, 0x00ffcc, 0xaa44ff, 0xff6600];
                color = colors[Math.floor(Math.random() * colors.length)];
            }
            const mat = new THREE.MeshStandardMaterial({ color: 0x111, emissive: color, emissiveIntensity: 0.8 });
            const obs = new THREE.Mesh(geo, mat);
            
            let lane;
            if (Math.random() < 0.2) {
                lane = (Math.random() - 0.5) * 6;
            } else {
                const remaining = lanes.filter(l => !usedLanes.includes(l));
                if (remaining.length > 0) {
                    lane = remaining[Math.floor(Math.random() * remaining.length)];
                    usedLanes.push(lane);
                } else {
                    lane = lanes[Math.floor(Math.random() * lanes.length)];
                }
            }
            
            obs.position.set(lane, h/2, -50);
            obs.userData = {
                width: w,
                height: h,
                passed: false,
                canShoot: canShoot,
                shootTimer: 0,
                hasShot: false,
                isOctahedron: typeRoll >= 0.72
            };
            obs.castShadow = true;
            scene.add(obs);
            obstacles.push(obs);
        }
    }

    function spawnCoin() {
        const geo = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 16);
        const mat = new THREE.MeshStandardMaterial({ color: 0x000, emissive: 0xffff00, emissiveIntensity: 1 });
        const coin = new THREE.Mesh(geo, mat);
        coin.rotation.x = Math.PI / 2;
        
        const lanes = [-3, -1.5, 0, 1.5, 3];
        coin.position.set(lanes[Math.floor(Math.random()*lanes.length)], 1, -50);
        coin.userData = { type: 'coin' };
        scene.add(coin);
        coins.push(coin);
    }

    function spawnPowerup() {
        const types = ['shield', 'boost', 'slow'];
        const type = types[Math.floor(Math.random()*types.length)];
        
        let color;
        if (type === 'shield') color = 0x00aaff;
        else if (type === 'boost') color = 0xffff00;
        else color = 0x00ff00;

        const geo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const mat = new THREE.MeshStandardMaterial({ color: 0x000, emissive: color, emissiveIntensity: 1 });
        const item = new THREE.Mesh(geo, mat);
        
        const lanes = [-3, -1.5, 0, 1.5, 3];
        item.position.set(lanes[Math.floor(Math.random()*lanes.length)], 0.8, -50);
        item.userData = { type: type };
        scene.add(item);
        powerups.push(item);
    }

    function shoot() {
        if (!canShoot || !isGameRunning) return;

        // 【最適化】共有Geometry/Material使用、PointLightは1つのみ保持
        const bullet = new THREE.Mesh(PLAYER_BULLET_GEO, PLAYER_BULLET_MAT);
        bullet.position.copy(player.position);
        bullet.position.z -= 1;

        scene.add(bullet);
        bullets.push(bullet);

        playSound('shoot');
        canShoot = false;
        shootCooldown = SHOOT_COOLDOWN_MAX;
    }

    // 敵の弾：レーンロック方式（直線弾、追尾なし）
    // 【最適化】共有Geometry/Material使用・PointLight廃止でフリーズ解消
    function enemyShoot(fromPos) {
        const bullet = new THREE.Mesh(ENEMY_BULLET_GEO, ENEMY_BULLET_MAT);

        // プレイヤーに最も近いレーンへ向けて発射
        const lanes = [-3, -1.5, 0, 1.5, 3];
        let targetLane = lanes[0];
        let bestDist = Math.abs(player.position.x - lanes[0]);
        for (let i = 1; i < lanes.length; i++) {
            const d = Math.abs(player.position.x - lanes[i]);
            if (d < bestDist) { bestDist = d; targetLane = lanes[i]; }
        }

        bullet.position.set(targetLane, fromPos.y, fromPos.z);
        bullet.userData = { vx: 0, vy: 0, vz: 0.65 };

        scene.add(bullet);
        enemyBullets.push(bullet);
    }

    function updateBullets() {
        const bulletSpeed = 1.5;
        
        for (let i = bullets.length - 1; i >= 0; i--) {
            const bullet = bullets[i];
            bullet.position.z -= bulletSpeed;

            let hit = false;
            
            for (let j = obstacles.length - 1; j >= 0; j--) {
                const obs = obstacles[j];
                const dx = Math.abs(bullet.position.x - obs.position.x);
                const dy = Math.abs(bullet.position.y - obs.position.y);
                const dz = Math.abs(bullet.position.z - obs.position.z);
                
                const w = obs.userData.width / 2;
                const h = obs.userData.height / 2;

                if (dx < (0.2 + w) && dy < (0.2 + h) && dz < 0.5) {
                    hit = true;
                    createExplosion(obs.position);
                    playSound('explode');
                    triggerShake(0.12);
                    scene.remove(obs);
                    obstacles.splice(j, 1);

                    const destroyScore = 300 * combo;
                    score += destroyScore;
                    destroyedCount++;
                    showMessage(`+${destroyScore.toLocaleString()} DESTROY!`, 800);
                    break;
                }
            }
            
            if (!hit) {
                for (let j = enemyBullets.length - 1; j >= 0; j--) {
                    const eBullet = enemyBullets[j];
                    const dist = bullet.position.distanceTo(eBullet.position);
                    if (dist < 0.4) {
                        hit = true;
                        scene.remove(eBullet);
                        enemyBullets.splice(j, 1);
                        createExplosion(bullet.position);
                        score += 50;
                        playSound('intercept');
                        showMessage("+50 INTERCEPT!", 600);
                        break;
                    }
                }
            }

            if (hit || bullet.position.z < -60) {
                scene.remove(bullet);
                bullets.splice(i, 1);
            }
        }
        
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            const bullet = enemyBullets[i];
            bullet.position.x += bullet.userData.vx;
            bullet.position.y += bullet.userData.vy;
            bullet.position.z += bullet.userData.vz;

            const dist = bullet.position.distanceTo(player.position);
            if (dist < 0.4) {
                if (activeShield) {
                    activeShield = false;
                    updatePowerupUI();
                    scene.remove(bullet);
                    enemyBullets.splice(i, 1);
                    combo = 1; consecutiveAvoid = 0; updateHUD();
                    playSound('shield'); triggerShake(0.2); triggerDamageFlash();
                    showMessage("🛡️ SHIELD!", 800);
                } else {
                    playSound('hit'); triggerShake(0.6); triggerDamageFlash();
                    gameOver();
                    return;
                }
            }

            if (bullet.position.z > 10 || bullet.position.z < -65) {
                scene.remove(bullet);
                enemyBullets.splice(i, 1);
            }
        }
    }

    function createExplosion(position) {
        for (let i = 0; i < 8; i++) {
            const geo = new THREE.SphereGeometry(0.1, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0xff0055 : 0xffaa00 });
            const particle = new THREE.Mesh(geo, mat);
            particle.position.copy(position);
            
            particle.userData = {
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                vz: (Math.random() - 0.5) * 0.3,
                life: 30
            };
            
            scene.add(particle);
            particles.push(particle);
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.position.x += p.userData.vx;
            p.position.y += p.userData.vy;
            p.position.z += p.userData.vz;
            p.userData.life--;

            if (p.userData.life <= 0) {
                scene.remove(p);
                particles.splice(i, 1);
            }
        }
    }

    function update() {
        const idleSpeed = 0.08;
        updateGridLoop(isGameRunning ? (activeSlow ? gameSpeed * 0.5 : gameSpeed) : idleSpeed);

        if (shootCooldown > 0) {
            shootCooldown--;
            if (shootCooldown === 0) canShoot = true;
        }
        updateCooldownUI();

        if (!isGameRunning) return;

        const cfg = settings[difficulty];
        const effectiveSpeed = activeSlow ? gameSpeed * 0.5 : gameSpeed;

        const moveSpeed = 0.25;
        if (keys.left) {
            velocityX = -moveSpeed;
            player.rotation.z = 0.2;
        } else if (keys.right) {
            velocityX = moveSpeed;
            player.rotation.z = -0.2;
        } else {
            velocityX *= 0.8;
            player.rotation.z *= 0.9;
        }
        player.position.x += velocityX;
        player.position.x = Math.max(-3.2, Math.min(3.2, player.position.x));

        velocityY -= GRAVITY;
        player.position.y += velocityY;
        if (player.position.y <= PLAYER_Y) {
            player.position.y = PLAYER_Y;
            velocityY = 0;
            isJumping = false;
        }
        player.rotation.x -= effectiveSpeed;

        if (stars) {
            const positions = stars.geometry.attributes.position.array;
            for(let i=2; i<positions.length; i+=3) {
                positions[i] += effectiveSpeed * 3;
                if(positions[i] > 15) positions[i] = -100;
            }
            stars.geometry.attributes.position.needsUpdate = true;
        }

        updateBullets();
        updateParticles();

        for (let i = obstacles.length - 1; i >= 0; i--) {
            const obs = obstacles[i];
            obs.position.z += effectiveSpeed;
            obs.rotation.y += 0.02;
            obs.rotation.x += obs.userData.isOctahedron ? 0.025 : 0;

            if (obs.userData.canShoot && cfg.enemyShootInterval > 0) {
                obs.userData.shootTimer++;
                // キャップチェック：上限に達していたら発射しない
                const underCap = enemyBullets.length < cfg.maxEnemyBullets;
                if (underCap && obs.position.z > -40 && obs.position.z < 5) {
                    if (!obs.userData.hasShot || obs.userData.shootTimer >= cfg.enemyShootInterval) {
                        enemyShoot(obs.position);
                        obs.userData.hasShot = true;
                        obs.userData.shootTimer = 0;
                    }
                }
            }

            const dx = Math.abs(player.position.x - obs.position.x);
            const dy = Math.abs(player.position.y - obs.position.y);
            const dz = Math.abs(player.position.z - obs.position.z);
            const w = obs.userData.width / 2;
            const h = obs.userData.height / 2;

            if (dx < (0.3 + w * 0.8) && dy < (0.3 + h * 0.8) && dz < 0.5) {
                if (activeShield) {
                    activeShield = false;
                    updatePowerupUI();
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    combo = 1; consecutiveAvoid = 0; updateHUD();
                    playSound('shield'); triggerShake(0.25); triggerDamageFlash();
                    showMessage("🛡️ SHIELD SAVED!", 1000);
                } else {
                    playSound('hit'); triggerShake(0.6); triggerDamageFlash();
                    gameOver();
                    return;
                }
            }

            if (!obs.userData.passed && obs.position.z > player.position.z && dz < 1.5 && dx < (w + 1.5)) {
                obs.userData.passed = true;
                consecutiveAvoid++;

                if (consecutiveAvoid % 3 === 0) {
                    combo = Math.min(10, combo + 1);
                    if (combo > maxCombo) maxCombo = combo;
                    showCombo();
                }

                // near-miss: just outside collision zone (at least 0.2 beyond hit radius)
                const nearMissDist = Math.max(0.9, 0.3 + w * 0.8 + 0.25);
                if (dx < nearMissDist) {
                    const bonus = 50 * combo;
                    score += bonus;
                    playSound('nearmiss');
                    showNearMiss(bonus);
                }
            }

            if (obs.position.z > 6) {
                scene.remove(obs);
                obstacles.splice(i, 1);
                const finalScore = 100 * combo * (activeBoost ? 2 : 1);
                score += finalScore;
            }
        }

        for (let i = coins.length - 1; i >= 0; i--) {
            const coin = coins[i];
            coin.position.z += effectiveSpeed;
            coin.rotation.z += 0.1;

            const dx = Math.abs(player.position.x - coin.position.x);
            const dy = Math.abs(player.position.y - coin.position.y);
            const dz = Math.abs(player.position.z - coin.position.z);

            if (dx < 0.6 && dy < 0.8 && dz < 0.6) {
                createCoinEffect(coin.position);
                triggerCoinFlash();
                playSound('coin');
                scene.remove(coin);
                coins.splice(i, 1);
                score += 200 * combo;
                showMessage("+" + (200 * combo).toLocaleString(), 800);
            } else if (coin.position.z > 6) {
                scene.remove(coin);
                coins.splice(i, 1);
            }
        }

        for (let i = powerups.length - 1; i >= 0; i--) {
            const item = powerups[i];
            item.position.z += effectiveSpeed;
            item.rotation.y += 0.05;

            const dx = Math.abs(player.position.x - item.position.x);
            const dy = Math.abs(player.position.y - item.position.y);
            const dz = Math.abs(player.position.z - item.position.z);

            if (dx < 0.7 && dy < 0.7 && dz < 0.6) {
                scene.remove(item);
                powerups.splice(i, 1);
                activatePowerup(item.userData.type);
            } else if (item.position.z > 6) {
                scene.remove(item);
                powerups.splice(i, 1);
            }
        }

        spawnTimer++;
        if (spawnTimer > cfg.obstRate) {
            spawnObstacle();
            spawnTimer = 0;
        }

        itemSpawnTimer++;
        if (itemSpawnTimer > cfg.coinRate) {
            if (Math.random() > 0.5) spawnCoin();
            itemSpawnTimer = 0;
        }
        if (Math.random() < 0.002) spawnPowerup();

        if (activeBoost) {
            boostTimer--;
            if (boostTimer <= 0) { activeBoost = false; updatePowerupUI(); }
        }
        if (activeSlow) {
            slowTimer--;
            if (slowTimer <= 0) { activeSlow = false; updatePowerupUI(); }
        }
        updatePowerupTimers();

        if (gameSpeed < cfg.max) gameSpeed += cfg.accel;

        distance += effectiveSpeed;
        updateHUD();
    }

    function updateGridLoop(speed) {
        const gridSize = 80;
        gridHelper1.position.z += speed;
        gridHelper2.position.z += speed;
        if (gridHelper1.position.z > gridSize) gridHelper1.position.z = gridHelper2.position.z - gridSize;
        if (gridHelper2.position.z > gridSize) gridHelper2.position.z = gridHelper1.position.z - gridSize;
    }

    function activatePowerup(type) {
        playSound('powerup');
        if (type === 'shield') {
            activeShield = true;
            showMessage("🛡️ SHIELD!", 1500);
        } else if (type === 'boost') {
            activeBoost = true;
            boostTimer = 300;
            showMessage("⚡ BOOST x2!", 1500);
        } else if (type === 'slow') {
            activeSlow = true;
            slowTimer = 300;
            showMessage("🕐 SLOW-MO!", 1500);
        }
        updatePowerupUI();
    }

    function updatePowerupUI() {
        document.getElementById('powerup-shield').classList.toggle('hidden', !activeShield);
        document.getElementById('powerup-boost').classList.toggle('hidden', !activeBoost);
        document.getElementById('powerup-slow').classList.toggle('hidden', !activeSlow);
    }

    function updatePowerupTimers() {
        if (activeBoost) {
            document.getElementById('boost-timer-bar').style.width = (boostTimer / 300 * 100) + '%';
        }
        if (activeSlow) {
            document.getElementById('slow-timer-bar').style.width = (slowTimer / 300 * 100) + '%';
        }
    }

    function updateCooldownUI() {
        const bar = document.getElementById('cooldown-bar');
        const percentage = ((SHOOT_COOLDOWN_MAX - shootCooldown) / SHOOT_COOLDOWN_MAX) * 100;
        bar.style.width = percentage + '%';
    }

    function updateHUD() {
        document.getElementById('score-val').innerText = score.toLocaleString();
        document.getElementById('dist-val').innerText = Math.floor(distance).toLocaleString() + "m";
        document.getElementById('combo-val').innerText = "x" + combo;
    }

    function showCombo() {
        const el = document.getElementById('combo-flash');
        el.innerText = `COMBO x${combo}!`;
        el.style.opacity = 1;
        setTimeout(() => { el.style.opacity = 0; }, 800);
    }

    function showNearMiss(bonus) {
        const el = document.getElementById('nearmiss-msg');
        el.innerText = `+${bonus} NEAR MISS!`;
        el.style.opacity = 1;
        setTimeout(() => { el.style.opacity = 0; }, 600);
    }

    function showMessage(text, duration) {
        const el = document.getElementById('nearmiss-msg');
        el.innerText = text;
        el.style.opacity = 1;
        setTimeout(() => { el.style.opacity = 0; }, duration);
    }

    function triggerShake(amount) {
        shakeAmount = Math.max(shakeAmount, amount);
    }

    function triggerDamageFlash() {
        const el = document.getElementById('damage-flash');
        el.style.opacity = '1';
        setTimeout(() => { el.style.opacity = '0'; }, 180);
    }

    function triggerCoinFlash() {
        const el = document.getElementById('coin-flash');
        el.style.opacity = '1';
        setTimeout(() => { el.style.opacity = '0'; }, 140);
    }

    function createCoinEffect(position) {
        for (let i = 0; i < 10; i++) {
            const geo = new THREE.SphereGeometry(0.07, 6, 6);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const p = new THREE.Mesh(geo, mat);
            p.position.copy(position);
            p.userData = {
                vx: (Math.random() - 0.5) * 0.25,
                vy: 0.05 + Math.random() * 0.2,
                vz: (Math.random() - 0.5) * 0.25,
                life: 28, isCoin: true
            };
            scene.add(p); particles.push(p);
        }
    }

    function gameOver() {
        playSound('gameover');
        isGameRunning = false;
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('gameover-screen').classList.remove('hidden');
        document.getElementById('controls-hint').classList.add('hidden');
        document.getElementById('cooldown-container').classList.add('hidden');
        document.getElementById('final-score').innerText = score.toLocaleString();
        document.getElementById('final-dist').innerText = Math.floor(distance).toLocaleString() + "m";
        document.getElementById('max-combo').innerText = "x" + maxCombo;
        document.getElementById('destroyed-count').innerText = destroyedCount;

        const isNewRecord = checkAndSaveHighScore(difficulty, score);
        document.getElementById('best-score').innerText = getHighScore(difficulty).toLocaleString();
        const recMsg = document.getElementById('new-record-msg');
        recMsg.style.display = isNewRecord ? 'block' : 'none';
        updateStartScreenHighScores();
    }

    function onKeyDown(e) {
        if (e.code === 'Escape') {
            if (isGameRunning && !isPaused) pauseGame();
            return;
        }

        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if (e.code === 'KeyW' || e.code === 'ArrowUp') shoot();
        if (e.code === 'Space') {
            if (!isJumping && isGameRunning) {
                velocityY = JUMP_FORCE;
                isJumping = true;
                playSound('jump');
            }
            if (!isGameRunning && !document.getElementById('gameover-screen').classList.contains('hidden')) {
                startGame();
            }
        }
    }

    function onKeyUp(e) {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    }

    function onMouseClick(e) {
        if (isGameRunning) shoot();
    }

    function initTouchControls() {
        let touchStartX = 0, touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            initAudio(); // ブラウザ制限対策：ユーザーインタラクションでAudioContext初期化
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (!isGameRunning) return;
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;

            keys.left  = dx < -25;
            keys.right = dx > 25;

            if (dy < -55 && !isJumping && isGameRunning) {
                velocityY = JUMP_FORCE;
                isJumping = true;
                playSound('jump');
            }
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            const dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
            const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
            keys.left = false;
            keys.right = false;
            // タップ（ほぼ移動なし）で射撃
            if (dx < 20 && dy < 20 && isGameRunning) shoot();
        }, { passive: true });
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        update();

        // スクリーンシェイク
        if (shakeAmount > 0.005) {
            const t = Date.now() * 0.05;
            camera.position.x = CAM_BASE_X + Math.sin(t * 1.7) * shakeAmount;
            camera.position.y = CAM_BASE_Y + Math.cos(t * 2.3) * shakeAmount;
            shakeAmount *= 0.82;
        } else {
            camera.position.x = CAM_BASE_X;
            camera.position.y = CAM_BASE_Y;
            shakeAmount = 0;
        }

        renderer.render(scene, camera);
    }

    init();
    </script>
</body>
</html>
