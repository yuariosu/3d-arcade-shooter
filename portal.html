<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAME PORTAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07070f;
      --card-bg: #0d0d1a;
      --border: rgba(255,255,255,0.07);
      --text: #e2e8f0;
      --muted: #556070;
      --toolbar-h: 52px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ─── Stars ──────────────────────────────── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur) var(--delay) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: var(--min); transform: scale(1); }
      to   { opacity: var(--max); transform: scale(1.4); }
    }

    /* ─── Portal Screen ──────────────────────── */
    #portal-screen {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 60px 24px 80px;
    }

    /* Header */
    .portal-header {
      text-align: center;
      margin-bottom: 64px;
    }
    .portal-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .portal-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #818cf8 0%, #c084fc 45%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.06em;
      animation: titlePulse 4s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(129,140,248,0.4)); }
      50%       { filter: drop-shadow(0 0 40px rgba(192,132,252,0.6)); }
    }
    .portal-subtitle {
      margin-top: 14px;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Games Grid */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 24px;
      max-width: 1120px;
      width: 100%;
    }

    /* Game Card */
    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.32s cubic-bezier(.22,1,.36,1),
                  box-shadow 0.32s ease,
                  border-color 0.32s ease;
      display: flex;
      flex-direction: column;
    }
    .game-card:hover {
      transform: translateY(-10px) scale(1.01);
      border-color: var(--accent);
      box-shadow: 0 24px 60px rgba(0,0,0,0.6),
                  0 0 0 1px var(--accent),
                  0 0 40px -10px var(--accent);
    }
    .game-card:active {
      transform: translateY(-4px) scale(0.99);
    }

    /* Card banner */
    .card-banner {
      height: 170px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
      overflow: hidden;
    }
    .card-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 25%, rgba(255,255,255,0.18), transparent 60%);
    }
    .card-banner::after {
      content: '';
      position: absolute;
      bottom: -30px; right: -30px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .card-icon {
      font-size: 5rem;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
      transition: transform 0.3s ease;
    }
    .game-card:hover .card-icon {
      transform: scale(1.15) rotate(-5deg);
    }
    .card-badge {
      position: absolute;
      top: 14px; right: 14px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
    }

    /* Card body */
    .card-body {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-genre {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .card-desc {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
      margin-bottom: 20px;
    }
    .btn-play {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-play:hover  { opacity: 0.88; }
    .btn-play:active { transform: scale(0.97); }
    .btn-play svg {
      width: 14px; height: 14px;
      fill: currentColor;
    }

    /* Footer hint */
    .portal-footer {
      margin-top: 48px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ─── Game Screen ────────────────────────── */
    #game-screen {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #game-screen.active {
      opacity: 1;
      pointer-events: all;
    }

    .game-toolbar {
      height: var(--toolbar-h);
      background: #09090f;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 14px;
      flex-shrink: 0;
    }
    .btn-back {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #c0c8d8;
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-back:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }
    .toolbar-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.1);
    }
    .toolbar-esc {
      margin-left: auto;
      font-size: 0.68rem;
      color: #2e3848;
      letter-spacing: 0.05em;
    }

    .frame-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #game-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.3s ease;
      z-index: 10;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    /* Responsive */
    @media (max-width: 580px) {
      .portal-header { margin-bottom: 40px; }
      .games-grid { grid-template-columns: 1fr; gap: 16px; }
      #portal-screen { padding: 40px 16px 60px; }
    }
  </style>
</head>
<body>

<!-- Star field -->
<div class="stars" id="stars"></div>

<!-- ── Portal Screen ─────────────────────────── -->
<div id="portal-screen">
  <div class="portal-header">
    <p class="portal-eyebrow">SELECT YOUR GAME</p>
    <h1 class="portal-title">GAME<br>PORTAL</h1>
    <p class="portal-subtitle">ゲームを選んでプレイしよう</p>
  </div>

  <div class="games-grid" id="games-grid"></div>

  <p class="portal-footer">カードをクリックしてゲームを起動 &nbsp;·&nbsp; ESC でポータルに戻る</p>
</div>

<!-- ── Game Screen ───────────────────────────── -->
<div id="game-screen">
  <div class="game-toolbar">
    <button class="btn-back" id="btn-back">
      <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
        <path d="M10.5 3L5.5 8l5 5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      PORTAL
    </button>
    <div class="toolbar-sep"></div>
    <span class="toolbar-title" id="toolbar-title"></span>
    <span class="toolbar-esc">ESC で戻る</span>
  </div>
  <div class="frame-wrapper">
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <span class="loading-label">LOADING...</span>
    </div>
    <iframe id="game-frame"
      allowfullscreen
      allow="autoplay; fullscreen; keyboard-map; pointer-lock"
    ></iframe>
  </div>
</div>

<script>
// ── Game data ───────────────────────────────────
const GAMES = [
  {
    title: 'NUMBER PATH',
    genre: 'パズル',
    desc:  '数字を順番に繋いで全マスを埋めよう。論理とひらめきで解く本格パズルゲーム。',
    icon:  '🧩',
    url:   'https://yuariosu.github.io/zip-game/',
    accent:     '#6366f1',
    accentDark: '#1a1040',
  },
  {
    title: 'STACK 3D',
    genre: 'アクション',
    desc:  'タイミングよくブロックを積み上げろ。どこまで高く積めるか挑戦しよう。',
    icon:  '🏗️',
    url:   'https://yuariosu.github.io/stack-play/',
    accent:     '#a78bfa',
    accentDark: '#200a50',
  },
  {
    title: 'SINGULARITY ENGINE',
    genre: 'シューター',
    desc:  '3D空間で次々と迫る敵を撃ち倒せ。スコアを競うアーケードシューター。',
    icon:  '🚀',
    url:   'https://yuariosu.github.io/3d-arcade-shooter/',
    accent:     '#06b6d4',
    accentDark: '#032a38',
  },
  {
    title: 'OPERATION OVERLORD',
    genre: '戦術',
    desc:  '3D戦術戦争ゲーム。高度な戦略を駆使して敵軍を制圧せよ。',
    icon:  '⚔️',
    url:   'https://yuariosu.github.io/battle_game/',
    accent:     '#c8a044',
    accentDark: '#2a1a00',
  },
];

// ── Render star field ───────────────────────────
(function renderStars() {
  const container = document.getElementById('stars');
  const N = 120;
  for (let i = 0; i < N; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() < 0.7 ? 1 : Math.random() < 0.8 ? 1.5 : 2;
    s.style.cssText = [
      `width:${size}px`,`height:${size}px`,
      `left:${Math.random()*100}%`,`top:${Math.random()*100}%`,
      `--dur:${(2 + Math.random()*4).toFixed(1)}s`,
      `--delay:${(Math.random()*4).toFixed(1)}s`,
      `--min:${(0.05 + Math.random()*0.15).toFixed(2)}`,
      `--max:${(0.4  + Math.random()*0.5).toFixed(2)}`,
    ].join(';');
    container.appendChild(s);
  }
})();

// ── Render game cards ───────────────────────────
const grid = document.getElementById('games-grid');
GAMES.forEach((g, i) => {
  const card = document.createElement('div');
  card.className = 'game-card';
  card.style.setProperty('--accent',      g.accent);
  card.style.setProperty('--accent-dark', g.accentDark);
  card.innerHTML = `
    <div class="card-banner">
      <div class="card-icon">${g.icon}</div>
      <span class="card-badge">${g.genre}</span>
    </div>
    <div class="card-body">
      <div class="card-genre">${g.genre}</div>
      <h2 class="card-title">${g.title}</h2>
      <p class="card-desc">${g.desc}</p>
      <button class="btn-play">
        <svg viewBox="0 0 16 16"><path d="M4 3l10 5-10 5V3z"/></svg>
        PLAY NOW
      </button>
    </div>
  `;
  card.addEventListener('click', () => launchGame(g));
  grid.appendChild(card);
});

// ── Game launch / return ────────────────────────
const gameScreen  = document.getElementById('game-screen');
const frame       = document.getElementById('game-frame');
const loadingEl   = document.getElementById('loading');
const toolbarTitle= document.getElementById('toolbar-title');

function launchGame(g) {
  toolbarTitle.textContent = g.title;
  loadingEl.classList.remove('hidden');
  frame.onload = () => loadingEl.classList.add('hidden');
  frame.src = g.url;
  gameScreen.classList.add('active');
  document.title = g.title + ' — GAME PORTAL';
}

function returnToPortal() {
  gameScreen.classList.remove('active');
  setTimeout(() => { frame.src = 'about:blank'; }, 260);
  document.title = 'GAME PORTAL';
}

document.getElementById('btn-back').addEventListener('click', returnToPortal);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') returnToPortal();
});
</script>
</body>
</html>
